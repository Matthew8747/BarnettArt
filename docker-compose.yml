# Local development stack. Production uses Neon (Postgres) + Vercel, NOT this.
# Start:  docker compose up -d
# Stop:   docker compose down        (add -v to also wipe the data volume)
services:
  db:
    image: postgres:17-alpine
    container_name: barnett-art-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: barnett
      POSTGRES_PASSWORD: barnett_dev_password
      POSTGRES_DB: barnett_art
    ports:
      - "5432:5432"
    volumes:
      - barnett_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barnett -d barnett_art"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  barnett_pgdata:
